---
apiVersion: s3.spiarh.fr/v1alpha1
kind: GaragePermission
metadata:
  labels:
    app.kubernetes.io/name: garage-s3-operator
    app.kubernetes.io/managed-by: kustomize
  name: app-key-media
  namespace: garage-system
spec:
  keyRef:
    name: app-key
    namespace: garage-system
  bucketRef:
    name: media
    namespace: garage-system
  permissions:
    owner: false
    read: true
    write: true
