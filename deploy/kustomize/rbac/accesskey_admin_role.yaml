# This rule is not used by the project garage-s3-operator itself.
# It is provided to allow the cluster admin to help manage garagepermissions for users.
#
# Grants full garagepermissions ('*') over s3.spiarh.fr.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific garagepermissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: garage-s3-operator
    app.kubernetes.io/managed-by: kustomize
  name: accesskey-admin-role
rules:
- apiGroups:
  - s3.spiarh.fr
  resources:
  - garageaccesskeys
  verbs:
  - '*'
- apiGroups:
  - s3.spiarh.fr
  resources:
  - garageaccesskeys/status
  verbs:
  - get
